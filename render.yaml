services:
  - type: web
    name: dealwatch-api
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: checksPass
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dealwatch-postgres
          property: connectionString
      - key: PORT
        value: "10000"
      - key: API_HOST
        value: "0.0.0.0"
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_DISPLAY_NAME
        value: DealWatch Owner
      - key: OWNER_BOOTSTRAP_TOKEN
        sync: false
      - key: APP_BASE_URL
        value: https://dealwatch-api.onrender.com
      - key: WEBUI_DEV_URL
        value: https://dealwatch-webui.onrender.com
      - key: ZIP_CODE
        sync: false
      - key: WORKER_POLL_SECONDS
        value: "60"
      - key: DEFAULT_TASK_CADENCE_MINUTES
        value: "360"
      - key: DEFAULT_NOTIFICATION_COOLDOWN_MINUTES
        value: "240"
      # Temporary SQLite/bootstrap bridge only. PostgreSQL deployments should keep this disabled.
      - key: PRODUCT_AUTO_CREATE_SCHEMA
        value: "false"
      - key: ENABLED_STORES
        value: weee,ranch99,target
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: PLAYWRIGHT_BLOCK_STYLESHEETS
        value: "true"
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: POSTMARK_FROM_EMAIL
        sync: false
      - key: POSTMARK_MESSAGE_STREAM
        value: outbound
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: USE_LLM
        value: "false"
      - key: LLM_API_KEY
        sync: false

  - type: worker
    name: dealwatch-worker
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m dealwatch worker
    autoDeployTrigger: checksPass
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dealwatch-postgres
          property: connectionString
      - key: OWNER_EMAIL
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: OWNER_EMAIL
      - key: OWNER_DISPLAY_NAME
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: OWNER_DISPLAY_NAME
      - key: OWNER_BOOTSTRAP_TOKEN
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: OWNER_BOOTSTRAP_TOKEN
      - key: APP_BASE_URL
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: APP_BASE_URL
      - key: WEBUI_DEV_URL
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: WEBUI_DEV_URL
      - key: ZIP_CODE
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: ZIP_CODE
      - key: WORKER_POLL_SECONDS
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: WORKER_POLL_SECONDS
      - key: DEFAULT_TASK_CADENCE_MINUTES
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: DEFAULT_TASK_CADENCE_MINUTES
      - key: DEFAULT_NOTIFICATION_COOLDOWN_MINUTES
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: DEFAULT_NOTIFICATION_COOLDOWN_MINUTES
      - key: PRODUCT_AUTO_CREATE_SCHEMA
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: PRODUCT_AUTO_CREATE_SCHEMA
      - key: ENABLED_STORES
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: ENABLED_STORES
      - key: PLAYWRIGHT_HEADLESS
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: PLAYWRIGHT_HEADLESS
      - key: PLAYWRIGHT_BLOCK_STYLESHEETS
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: PLAYWRIGHT_BLOCK_STYLESHEETS
      - key: POSTMARK_SERVER_TOKEN
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: POSTMARK_SERVER_TOKEN
      - key: POSTMARK_FROM_EMAIL
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: POSTMARK_FROM_EMAIL
      - key: POSTMARK_MESSAGE_STREAM
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: POSTMARK_MESSAGE_STREAM
      - key: SMTP_HOST
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: SMTP_HOST
      - key: SMTP_USER
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: SMTP_USER
      - key: SMTP_PASSWORD
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: SMTP_PASSWORD
      - key: USE_LLM
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: USE_LLM
      - key: LLM_API_KEY
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: LLM_API_KEY

  - type: web
    name: dealwatch-webui
    runtime: static
    plan: free
    buildCommand: cd frontend && corepack enable && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: ./frontend/dist
    autoDeployTrigger: checksPass
    previews:
      generation: automatic
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: dealwatch-api
          envVarKey: APP_BASE_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: dealwatch-postgres
    databaseName: dealwatch
    plan: free
